<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>约会邀请</title>
<style>
  :root {
    --pink-bg: #ffe1ec;
    --pink-card: #fff5f8;
    --pink-deep: #ff5c8a;
    --pink-deep2: #e8487a;
    --text-dark: #4a2b35;
    --heart-color: #ff8fab;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Comic Sans MS", "Chalkboard SE", "Segoe UI", sans-serif;
    background: var(--pink-bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* floating hearts background */
  .hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .heart {
    position: absolute;
    bottom: -10%;
    font-size: 24px;
    opacity: 0.6;
    animation: floatUp linear infinite;
    color: var(--heart-color);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.7; }
    100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(360deg); opacity: 0; }
  }

  .stage {
    position: relative;
    z-index: 1;
    width: 92%;
    max-width: 380px;
  }

  .card {
    background: var(--pink-card);
    border: 3px solid var(--pink-deep);
    border-radius: 28px;
    padding: 28px 22px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(255, 92, 138, 0.25);
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 14px;
    display: block;
    border: 4px solid var(--pink-deep);
    background: #cdebc5;
  }

  h1 {
    font-size: 22px;
    color: var(--text-dark);
    margin: 6px 0 18px;
    line-height: 1.4;
  }

  .btn-row {
    position: relative;
    display: flex;
    justify-content: center;
    gap: 16px;
    min-height: 56px;
    align-items: center;
  }

  button {
    font-family: inherit;
    font-size: 17px;
    font-weight: bold;
    padding: 14px 38px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .yes-btn {
    background: linear-gradient(135deg, var(--pink-deep), var(--pink-deep2));
    color: #fff;
    box-shadow: 0 6px 16px rgba(232, 72, 122, 0.4);
  }
  .yes-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 8px 20px rgba(232, 72, 122, 0.55);
  }

  .no-btn {
    background: #ffd2e0;
    color: var(--pink-deep2);
    position: absolute;
  }

  .subtitle {
    margin-top: 14px;
    font-size: 13px;
    color: #c97a92;
  }

  /* ===== Step screens ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Calendar */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    color: var(--text-dark);
    font-weight: bold;
    font-size: 17px;
  }
  .cal-header button {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--pink-deep2);
    padding: 4px 10px;
    cursor: pointer;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 16px;
  }
  .cal-grid .dow {
    font-size: 12px;
    font-weight: bold;
    color: #c97a92;
    text-align: center;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 14px;
    color: var(--text-dark);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .cal-day:hover { background: #ffd2e0; }
  .cal-day.selected {
    background: var(--pink-deep);
    color: #fff;
    font-weight: bold;
  }
  .cal-day.empty { cursor: default; }
  .cal-day.empty:hover { background: none; }

  /* Time picker */
  .time-picker {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin: 14px 0 20px;
  }
  .time-col {
    height: 140px;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    width: 64px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .time-col::-webkit-scrollbar { display: none; }
  .time-col .opt {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: center;
    font-size: 18px;
    color: #d7a7b8;
  }
  .time-col .opt.active {
    color: var(--pink-deep2);
    font-weight: bold;
    font-size: 22px;
  }
  .time-picker-wrap {
    position: relative;
  }
  .time-picker-wrap::before,
  .time-picker-wrap::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 50px;
    pointer-events: none;
    z-index: 2;
  }
  .time-picker-wrap::before {
    top: 0;
    background: linear-gradient(to bottom, var(--pink-card), transparent);
  }
  .time-picker-wrap::after {
    bottom: 20px;
    background: linear-gradient(to top, var(--pink-card), transparent);
  }
  .time-highlight {
    position: absolute;
    left: 0; right: 0;
    top: 50px;
    height: 40px;
    background: #ffe7ee;
    border-radius: 10px;
    z-index: 0;
  }

  /* Vibe picker */
  .vibe-sub {
    font-size: 13px;
    color: #c97a92;
    margin: -10px 0 16px;
  }
  .vibe-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .vibe-item {
    background: #fff;
    border: 2px solid #ffd2e0;
    border-radius: 14px;
    padding: 14px 6px;
    font-size: 30px;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .vibe-item .label {
    font-size: 11px;
    color: var(--text-dark);
    font-weight: bold;
  }
  .vibe-item:hover { transform: translateY(-2px); }
  .vibe-item.selected {
    border-color: var(--pink-deep);
    background: #fff0f4;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(232,72,122,0.25);
  }

  .confirm-btn {
    width: 100%;
    background: #e8c2cf;
    color: #fff;
    font-size: 16px;
    padding: 14px;
    border-radius: 30px;
    cursor: not-allowed;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
  .confirm-btn.ready {
    background: linear-gradient(135deg, var(--pink-deep), var(--pink-deep2));
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(232, 72, 122, 0.4);
  }
  .confirm-btn.ready:hover { transform: scale(1.03); }

  /* Final screen */
  .final-emoji { font-size: 64px; margin-bottom: 8px; }
  .final-detail {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    margin: 16px 0;
    text-align: left;
    font-size: 14px;
    color: var(--text-dark);
    line-height: 1.7;
  }
  .final-detail b { color: var(--pink-deep2); }
  .restart {
    background: none;
    border: none;
    color: var(--pink-deep2);
    text-decoration: underline;
    font-size: 13px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="stage">

  <!-- Step 1: Ask -->
  <div class="screen active" id="screen-ask">
    <div class="card">
      <div class="avatar" id="avatar-emoji" style="display:flex;align-items:center;justify-content:center;font-size:64px;">🥺</div>
      <h1>你会跟我约会吗？<br><span style="font-size:16px; opacity:0.8;">Will you go on a date with me? 🥺</span></h1>
      <div class="btn-row" id="btnRow">
        <button class="no-btn" id="noBtn">No</button>
        <button class="yes-btn" id="yesBtn">Yes</button>
      </div>
      <div class="subtitle">点点小桃心，给我个机会吧 💕</div>
    </div>
  </div>

  <!-- Step 2: Pick a date -->
  <div class="screen" id="screen-date">
    <div class="card">
      <div class="cal-header">
        <button id="prevMonth">‹</button>
        <span id="monthLabel"></span>
        <button id="nextMonth">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <button class="confirm-btn" id="dateConfirm">选好日子啦 ✓</button>
    </div>
  </div>

  <!-- Step 3: Pick a time -->
  <div class="screen" id="screen-time">
    <div class="card">
      <h1 style="font-size:18px;">几点见面比较好呢？<br><span style="font-size:14px; opacity:0.8;">Pick a time</span></h1>
      <div class="time-picker-wrap">
        <div class="time-highlight"></div>
        <div class="time-picker">
          <div class="time-col" id="hourCol"></div>
          <div class="time-col" id="minCol"></div>
          <div class="time-col" id="ampmCol"></div>
        </div>
      </div>
      <button class="confirm-btn ready" id="timeConfirm">就这个时间 ✓</button>
    </div>
  </div>

  <!-- Step 4: Pick vibe -->
  <div class="screen" id="screen-vibe">
    <div class="card">
      <h1 style="font-size:18px;">what's your vibe? 🌷</h1>
      <div class="vibe-sub">选一个我们的理想活动 / Pick our ideal activity</div>
      <div class="vibe-grid" id="vibeGrid">
        <div class="vibe-item" data-vibe="高尔夫 Mini golf">⛳<span class="label">Mini Golf</span></div>
        <div class="vibe-item" data-vibe="散步 Walk &amp; talk">🚶<span class="label">Walk &amp; Talk</span></div>
        <div class="vibe-item" data-vibe="看电影 Movie night">🎬<span class="label">Movie Night</span></div>
        <div class="vibe-item" data-vibe="跳舞 Dancing">💃<span class="label">Dancing</span></div>
        <div class="vibe-item" data-vibe="游乐园 Theme park">🎢<span class="label">Theme Park</span></div>
        <div class="vibe-item" data-vibe="海边 Beach day">🏝️<span class="label">Beach Day</span></div>
      </div>
      <button class="confirm-btn" id="vibeConfirm">Pick one first</button>
    </div>
  </div>

  <!-- Step 5: Final -->
  <div class="screen" id="screen-final">
    <div class="card">
      <div class="final-emoji">🎉💌</div>
      <h1 style="font-size:20px;">约会安排好啦！<br><span style="font-size:14px; opacity:0.8;">It's a date!</span></h1>
      <div class="final-detail">
        📅 <b>日期 Date:</b> <span id="finalDate"></span><br>
        ⏰ <b>时间 Time:</b> <span id="finalTime"></span><br>
        💖 <b>活动 Activity:</b> <span id="finalVibe"></span>
      </div>
      <div class="subtitle">期待和你见面啦～ 💕</div>
      <button class="restart" id="restartBtn">重新选择 / Restart</button>
    </div>
  </div>

</div>

<script>
  /* ---------- floating hearts background ---------- */
  const heartsContainer = document.getElementById('hearts');
  const heartEmojis = ['💗','💖','💕','💓','💞'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
    h.style.animationDuration = (8 + Math.random() * 10) + 's';
    h.style.animationDelay = (Math.random() * 10) + 's';
    h.style.fontSize = (16 + Math.random() * 20) + 'px';
    heartsContainer.appendChild(h);
  }

  /* ---------- step 1: dodging "No" button ---------- */
  const btnRow = document.getElementById('btnRow');
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');

  function dodge() {
    const rowRect = btnRow.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    const maxX = rowRect.width - btnRect.width;
    const maxY = rowRect.height - btnRect.height;
    const randX = Math.random() * Math.max(maxX, 0);
    const randY = Math.random() * Math.max(maxY, 0);
    noBtn.style.left = randX + 'px';
    noBtn.style.top = randY + 'px';
  }
  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('click', (e) => { e.preventDefault(); dodge(); });
  // touch support
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); });

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  yesBtn.addEventListener('click', () => {
    showScreen('screen-date');
    buildCalendar();
  });

  /* ---------- step 2: calendar ---------- */
  let calMonth, calYear, selectedDate = null;
  const monthLabel = document.getElementById('monthLabel');
  const calGrid = document.getElementById('calGrid');
  const dateConfirm = document.getElementById('dateConfirm');
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dowNames = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

  function initCalendar() {
    const today = new Date();
    calMonth = today.getMonth();
    calYear = today.getFullYear();
  }

  function buildCalendar() {
    calGrid.innerHTML = '';
    monthLabel.textContent = `${monthNames[calMonth]} ${calYear}`;
    dowNames.forEach(d => {
      const el = document.createElement('div');
      el.className = 'dow';
      el.textContent = d;
      calGrid.appendChild(el);
    });
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      calGrid.appendChild(el);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;
      if (selectedDate && selectedDate.getDate() === d &&
          selectedDate.getMonth() === calMonth && selectedDate.getFullYear() === calYear) {
        el.classList.add('selected');
      }
      el.addEventListener('click', () => {
        selectedDate = new Date(calYear, calMonth, d);
        buildCalendar();
      });
      calGrid.appendChild(el);
    }
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    buildCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    buildCalendar();
  });

  dateConfirm.addEventListener('click', () => {
    if (!selectedDate) selectedDate = new Date();
    showScreen('screen-time');
    buildTimePicker();
  });

  /* ---------- step 3: time picker ---------- */
  const hourCol = document.getElementById('hourCol');
  const minCol = document.getElementById('minCol');
  const ampmCol = document.getElementById('ampmCol');

  function buildTimePicker() {
    if (hourCol.children.length) return; // build once
    const hours = Array.from({length:12}, (_,i)=> i+1);
    const mins = Array.from({length:12}, (_,i)=> (i*5).toString().padStart(2,'0'));
    const ampm = ['AM','PM'];

    function fillCol(col, items, defaultIndex) {
      // padding rows
      const padTop = document.createElement('div'); padTop.className='opt'; padTop.style.height='40px'; padTop.style.visibility='hidden';
      col.appendChild(padTop);
      items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'opt';
        el.textContent = item;
        col.appendChild(el);
      });
      const padBottom = padTop.cloneNode();
      col.appendChild(padBottom);

      col.addEventListener('scroll', () => updateActive(col));
      // scroll to default
      requestAnimationFrame(() => {
        col.scrollTop = defaultIndex * 40;
        updateActive(col);
      });
    }

    function updateActive(col) {
      const idx = Math.round(col.scrollTop / 40);
      [...col.children].forEach((c,i) => {
        c.classList.toggle('active', i === idx + 1);
      });
    }

    fillCol(hourCol, hours, 6);   // default ~ 7
    fillCol(minCol, mins, 0);     // default 00
    fillCol(ampmCol, ampm, 1);    // default PM
  }

  function getTimeValue(col, items) {
    const idx = Math.round(col.scrollTop / 40);
    return items[Math.min(Math.max(idx,0), items.length-1)];
  }

  document.getElementById('timeConfirm').addEventListener('click', () => {
    showScreen('screen-vibe');
  });

  /* ---------- step 4: vibe picker ---------- */
  const vibeGrid = document.getElementById('vibeGrid');
  const vibeConfirm = document.getElementById('vibeConfirm');
  let selectedVibe = null;

  vibeGrid.querySelectorAll('.vibe-item').forEach(item => {
    item.addEventListener('click', () => {
      vibeGrid.querySelectorAll('.vibe-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      selectedVibe = item.dataset.vibe;
      vibeConfirm.textContent = '约定啦！Let\'s go ✓';
      vibeConfirm.classList.add('ready');
    });
  });

  vibeConfirm.addEventListener('click', () => {
    if (!selectedVibe) return;
    finalize();
    showScreen('screen-final');
  });

  /* ---------- step 5: final summary ---------- */
  function finalize() {
    const hours = Array.from({length:12}, (_,i)=> i+1);
    const mins = Array.from({length:12}, (_,i)=> (i*5).toString().padStart(2,'0'));
    const ampm = ['AM','PM'];
    const h = getTimeValue(hourCol, hours);
    const m = getTimeValue(minCol, mins);
    const a = getTimeValue(ampmCol, ampm);

    document.getElementById('finalDate').textContent =
      selectedDate.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
    document.getElementById('finalTime').textContent = `${h}:${m} ${a}`;
    document.getElementById('finalVibe').textContent = selectedVibe;
  }

  document.getElementById('restartBtn').addEventListener('click', () => {
    selectedDate = null;
    selectedVibe = null;
    vibeGrid.querySelectorAll('.vibe-item').forEach(i => i.classList.remove('selected'));
    vibeConfirm.textContent = 'Pick one first';
    vibeConfirm.classList.remove('ready');
    noBtn.style.left = '';
    noBtn.style.top = '';
    initCalendar();
    showScreen('screen-ask');
  });

  initCalendar();
</script>
</body>
</html>

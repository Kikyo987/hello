<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七脉轮颜色自测</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#0d0a1a;
    --bg-glow:#241a3d;
    --text-primary:#f2eef9;
    --text-muted:#948ca8;
    --card-bg:rgba(255,255,255,0.035);
    --card-border:rgba(255,255,255,0.09);

    --c-root:#c0392b;
    --c-sacral:#dd7a2c;
    --c-solar:#d3a62e;
    --c-heart:#4e9e6d;
    --c-throat:#3a86b8;
    --c-eye:#5b52b0;
    --c-crown:#9a63d4;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, var(--bg-glow) 0%, transparent 60%),
      var(--bg-base);
    color:var(--text-primary);
    font-family:'Noto Sans SC', sans-serif;
    font-weight:300;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  .stars{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,.35), transparent),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,.3), transparent),
      radial-gradient(1.5px 1.5px at 85% 60%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,.25), transparent);
    background-repeat:no-repeat;
  }

  .app{
    position:relative; z-index:1;
    max-width:920px;
    margin:0 auto;
    padding:28px 20px 80px;
    display:flex;
    gap:36px;
  }

  header.top{
    text-align:center;
    margin:6px auto 30px;
    max-width:920px;
    padding:0 20px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.28em;
    color:var(--text-muted);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  h1.title{
    font-family:'Noto Serif SC', serif;
    font-weight:700;
    font-size:clamp(26px,4.5vw,38px);
    margin:0;
    background:linear-gradient(90deg,#e8b64a,#c86bd6 60%,#6f8fd6);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  /* ---------- spine column ---------- */
  .spine-wrap{
    flex:0 0 64px;
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
    position:sticky;
    top:24px;
    height:fit-content;
    gap:18px;
    padding:20px 0;
  }
  .spine-line{
    position:absolute;
    left:50%; top:20px; bottom:20px;
    width:2px;
    transform:translateX(-50%);
    background:linear-gradient(to top,
      var(--c-root),var(--c-sacral),var(--c-solar),
      var(--c-heart),var(--c-throat),var(--c-eye),var(--c-crown));
    opacity:.18;
    z-index:0;
  }
  .orb{
    position:relative;
    z-index:1;
    width:22px;height:22px;
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.04);
    transition:all .5s cubic-bezier(.22,1,.36,1);
  }
  .orb.done{
    border-color:transparent;
    box-shadow:0 0 14px 2px var(--glow-color), 0 0 3px 1px var(--glow-color);
    background:var(--glow-color);
  }
  .orb.active{
    border-color:var(--glow-color);
    animation:breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ transform:scale(1); box-shadow:0 0 6px 1px var(--glow-color);}
    50%{ transform:scale(1.28); box-shadow:0 0 18px 4px var(--glow-color);}
  }
  @media (prefers-reduced-motion: reduce){
    .orb.active{ animation:none; box-shadow:0 0 10px 2px var(--glow-color); }
  }

  main{flex:1; min-width:0;}

  /* ---------- panels ---------- */
  .panel{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:20px;
    padding:34px 30px;
    backdrop-filter:blur(6px);
  }
  .lede{color:var(--text-muted); line-height:1.9; font-size:15px; margin:0 0 22px;}
  .scale-key{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin:20px 0 28px;
  }
  .scale-key div{
    background:rgba(255,255,255,.04);
    border:1px solid var(--card-border);
    border-radius:12px;
    padding:12px 8px;
    text-align:center;
    font-size:13px;
    color:var(--text-muted);
  }
  .scale-key div b{display:block; color:var(--text-primary); font-size:18px; font-family:'Noto Serif SC',serif; margin-bottom:4px;}

  button.cta{
    appearance:none; border:none; cursor:pointer;
    font-family:'Noto Sans SC',sans-serif;
    font-size:15px; font-weight:500;
    color:#1a1425;
    background:linear-gradient(90deg,#e8b64a,#dd7a2c);
    padding:14px 30px;
    border-radius:999px;
    letter-spacing:.02em;
    transition:transform .25s ease, box-shadow .25s ease;
    box-shadow:0 8px 24px -8px rgba(221,122,44,.6);
  }
  button.cta:hover{ transform:translateY(-2px); box-shadow:0 12px 28px -8px rgba(221,122,44,.75); }
  button.cta:active{ transform:translateY(0); }
  button.cta.ghost{
    background:transparent;
    color:var(--text-muted);
    box-shadow:none;
    border:1px solid var(--card-border);
  }
  button.cta:disabled{ opacity:.35; cursor:not-allowed; transform:none; box-shadow:none;}

  /* ---------- quiz ---------- */
  .chakra-tag{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--text-muted); margin-bottom:6px;
  }
  .chakra-tag .dot{width:9px;height:9px;border-radius:50%; background:var(--glow-color); box-shadow:0 0 8px 1px var(--glow-color);}
  h2.section-title{
    font-family:'Noto Serif SC',serif;
    font-weight:600;
    font-size:26px;
    margin:0 0 26px;
    color:var(--glow-color);
  }
  .q-block{ margin-bottom:26px; }
  .q-text{ font-size:15.5px; line-height:1.7; margin-bottom:12px; color:var(--text-primary); }
  .options{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .opt{ position:relative; }
  .opt input{ position:absolute; opacity:0; inset:0; cursor:pointer; margin:0; }
  .opt label{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px;
    padding:10px 4px;
    border-radius:12px;
    border:1px solid var(--card-border);
    background:rgba(255,255,255,.03);
    font-size:12px;
    color:var(--text-muted);
    cursor:pointer;
    transition:all .2s ease;
    line-height:1.3;
    text-align:center;
    height:100%;
  }
  .opt label b{ font-family:'Noto Serif SC',serif; font-size:17px; color:var(--text-primary); font-weight:600;}
  .opt input:checked + label{
    border-color:var(--glow-color);
    background:color-mix(in srgb, var(--glow-color) 18%, transparent);
    box-shadow:0 0 0 1px var(--glow-color) inset;
  }
  .opt input:checked + label b{ color:var(--glow-color); }
  .opt input:focus-visible + label{ outline:2px solid var(--glow-color); outline-offset:2px; }

  .nav-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:30px;
  }
  .progress-text{ font-size:12px; color:var(--text-muted); letter-spacing:.05em; }

  /* ---------- results ---------- */
  .result-hero{ text-align:center; margin-bottom:34px; }
  .result-hero .eyebrow{ margin-bottom:14px; }
  .dominant-name{
    font-family:'Noto Serif SC',serif;
    font-weight:700;
    font-size:clamp(30px,6vw,46px);
    margin:0 0 10px;
    color:var(--glow-color);
    text-shadow:0 0 30px var(--glow-color);
  }
  .dominant-desc{ color:var(--text-muted); font-size:14.5px; max-width:540px; margin:0 auto; line-height:1.85;}

  .bars{ margin:34px 0 8px; display:flex; flex-direction:column; gap:14px;}
  .bar-row{ display:grid; grid-template-columns:88px 1fr 44px; align-items:center; gap:12px;}
  .bar-label{ font-size:13px; color:var(--text-muted); text-align:right; }
  .bar-track{ height:14px; border-radius:999px; background:rgba(255,255,255,.05); overflow:hidden; position:relative;}
  .bar-fill{ height:100%; border-radius:999px; transition:width 1.1s cubic-bezier(.22,1,.36,1); box-shadow:0 0 10px 0 var(--glow-color); }
  .bar-score{ font-size:13px; color:var(--text-primary); font-family:'Noto Serif SC',serif; }

  .divider{ border:none; border-top:1px solid var(--card-border); margin:34px 0; }

  h3.block-title{
    font-family:'Noto Serif SC',serif; font-weight:600;
    font-size:18px; margin:0 0 6px;
  }
  .block-sub{ font-size:13px; color:var(--text-muted); margin:0 0 20px; line-height:1.7;}

  /* detail cards */
  .detail-card{
    background:rgba(255,255,255,.03);
    border:1px solid var(--card-border);
    border-left:3px solid var(--glow-color);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:14px;
  }
  .detail-head{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin-bottom:10px;
  }
  .detail-head .dot{
    width:11px; height:11px; border-radius:50%;
    background:var(--glow-color);
    box-shadow:0 0 8px 1px var(--glow-color);
    flex:0 0 auto;
  }
  .detail-name{
    font-family:'Noto Serif SC',serif; font-weight:600;
    font-size:16px; color:var(--text-primary);
  }
  .detail-score{
    font-family:'Noto Serif SC',serif; font-size:16px; color:var(--glow-color);
    margin-left:auto;
  }
  .detail-score small{ font-size:11px; color:var(--text-muted); }
  .badge{
    font-size:11px; letter-spacing:.08em;
    padding:3px 10px; border-radius:999px;
    border:1px solid var(--card-border);
    color:var(--text-muted);
  }
  .badge.open{
    border-color:transparent;
    background:color-mix(in srgb, var(--glow-color) 22%, transparent);
    color:var(--text-primary);
  }
  .badge.blocked{
    border-color:rgba(255,120,120,.4);
    color:#e79a9a;
  }
  .detail-text{
    margin:0; font-size:13.5px; color:var(--text-muted); line-height:1.9;
  }
  .detail-heal{
    margin:10px 0 0; font-size:13px; line-height:1.8;
    color:var(--text-primary);
    background:color-mix(in srgb, var(--glow-color) 10%, transparent);
    border-radius:10px;
    padding:9px 13px;
  }
  .detail-heal b{ color:var(--glow-color); font-weight:500; }

  /* summary */
  .summary-box{
    background:rgba(255,255,255,.03);
    border:1px solid var(--card-border);
    border-radius:16px;
    padding:22px 24px;
  }
  .summary-box p{
    margin:0 0 14px; font-size:14px; line-height:2; color:var(--text-muted);
  }
  .summary-box p:last-child{ margin-bottom:0; }
  .summary-box .hl{ color:var(--text-primary); font-weight:400; }

  .footer-actions{ display:flex; justify-content:center; margin-top:30px; }
  .hidden{ display:none !important; }

  @media (max-width:640px){
    .app{ flex-direction:column; gap:0; padding-top:8px;}
    .spine-wrap{
      flex-direction:row;
      position:static;
      width:100%;
      padding:6px 0 22px;
      justify-content:center;
      gap:14px;
    }
    .spine-line{
      left:20px; right:20px; top:50%; bottom:auto; width:auto; height:2px;
      background:linear-gradient(to right,
        var(--c-root),var(--c-sacral),var(--c-solar),
        var(--c-heart),var(--c-throat),var(--c-eye),var(--c-crown));
      transform:none;
    }
    .options{ grid-template-columns:repeat(2,1fr); }
    .bar-row{ grid-template-columns:64px 1fr 36px; }
    .panel{ padding:26px 18px; }
    .detail-score{ margin-left:0; }
  }
</style>
</head>
<body>

<div class="stars"></div>

<header class="top">
  <div class="eyebrow">CHAKRA COLOR ASSESSMENT</div>
  <h1 class="title">七脉轮颜色自测</h1>
</header>

<div class="app">
  <div class="spine-wrap" id="spineWrap">
    <div class="spine-line"></div>
  </div>

  <main>

    <!-- INTRO -->
    <section id="intro" class="panel">
      <p class="lede">
        七个脉轮各对应四道题，请凭第一感觉作答，无需过度思考。
        全部答完后，将为你点亮专属的能量脊柱，并生成主导脉轮、逐轮详细解读与整体能量总结。
      </p>
      <div class="scale-key">
        <div><b>1</b>完全不符合</div>
        <div><b>2</b>偶尔</div>
        <div><b>3</b>经常</div>
        <div><b>4</b>完全符合</div>
      </div>
      <button class="cta" onclick="startQuiz()">开始测试</button>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="panel hidden">
      <div class="chakra-tag"><span class="dot" id="tagDot"></span><span id="tagLabel"></span></div>
      <h2 class="section-title" id="sectionTitle"></h2>
      <div id="questionsWrap"></div>
      <div class="nav-row">
        <button class="cta ghost" id="prevBtn" onclick="prevSection()">上一步</button>
        <span class="progress-text" id="progressText"></span>
        <button class="cta" id="nextBtn" onclick="nextSection()">下一步</button>
      </div>
    </section>

    <!-- RESULTS -->
    <section id="results" class="panel hidden">
      <div class="result-hero">
        <div class="eyebrow">你的主导脉轮</div>
        <div class="dominant-name" id="dominantName"></div>
        <p class="dominant-desc" id="dominantDesc"></p>
      </div>

      <div class="bars" id="barsWrap"></div>

      <hr class="divider">

      <h3 class="block-title">逐脉轮详细解读</h3>
      <p class="block-sub">按得分从高到低排列 · 13–16 能量通畅｜7–12 平衡中等｜1–6 脉轮堵塞</p>
      <div id="detailsWrap"></div>

      <hr class="divider">

      <h3 class="block-title">整体能量总结</h3>
      <div class="summary-box" id="summaryWrap"></div>

      <div class="footer-actions">
        <button class="cta ghost" onclick="restart()">重新测试</button>
      </div>
    </section>

  </main>
</div>

<script>
const CHAKRAS = [
  {
    key:'root', name:'海底轮', color:'红色', hex:'var(--c-root)',
    trait:'扎根务实，生命力强，擅长落地搞事业、稳定生活',
    heal:'多穿红色、赤脚踩草地、规律运动与睡眠，为海底轮补充能量',
    analysis:{
      high:'你是天生的"扎根者"。生命力旺盛、脚踏实地，对金钱、住所和生活节奏有稳定的掌控感——搞事业、过日子都让人放心。安全感是你行动的底气，也让身边的人愿意依靠你。这份稳定是其他六个脉轮向上生长的地基。',
      mid:'你的安全感时有时无：状态好的时候踏实笃定，压力一来就容易为生存问题焦虑，偶尔感觉"飘"、不接地气，身体上也可能时不时疲惫乏力。你的根基是有的，只是还不够深——把财务和生活节奏理顺，多接触大地与自然，能量会明显更稳。',
      low:'海底轮能量严重不足。你可能长期为钱、住所或未来感到不安，容易疲惫、体虚，想法很多却难以落地。这是最需要优先修复的根基——先照顾好睡眠、饮食和身体，把"根"扎稳，其他脉轮才有支撑。请对自己耐心一点，安全感是可以一点点重建的。'
    }
  },
  {
    key:'sacral', name:'脐轮', color:'橙色', hex:'var(--c-sacral)',
    trait:'感性浪漫，创造力旺盛，共情力极强',
    heal:'跳舞、画画、享受美食与旅行，用身体性的愉悦释放情绪',
    analysis:{
      high:'你的情绪像水一样自然流动——想哭就哭、想笑就笑，不压抑、不内耗。创造力和感受力都很旺盛，懂得从日常里榨出乐趣，在亲密关系中也放松自在、不羞于表达渴望。你是天生的"感受型创造者"，生活在你手里自带滋味。',
      mid:'你能感受情绪，但有时会卡住：偶尔压抑、偶尔内耗，兴趣爱好也时断时续，快乐来得快去得也快。你的感受力没有问题，只是出口不够多——给情绪多开几扇门，跳舞、画画、美食、旅行都可以，让"流动感"重新回来。',
      low:'情绪长期被压抑或阻塞，你可能感到麻木、提不起兴趣，对曾经喜欢的事物失去热情，或在亲密关系里紧绷、羞耻、难以放松。试着允许自己"只是感受"而不评判对错，用舞蹈、艺术、美食这类身体性的愉悦，慢慢唤醒这股沉睡的能量。'
    }
  },
  {
    key:'solar', name:'太阳轮', color:'黄色', hex:'var(--c-solar)',
    trait:'自信强大，主导型人格，目标感十足',
    heal:'多晒太阳、每天做自我肯定练习，从小决定开始建立边界',
    analysis:{
      high:'你自信、有主见、行动力强。清楚自己要什么，敢做决定、敢设边界、敢拒绝不合理的要求，遇事不会被动妥协。最难得的是，你不需要别人的认可来证明自己——这份"我说了算"的内核力量，是很多人终其一生都在寻找的东西。',
      mid:'你的自信时强时弱：在熟悉的领域果断有力，但遇到权威、冲突或陌生场合，就容易自我怀疑、妥协讨好。你的力量是真实存在的，只是还不够稳定——多晒太阳、多做自我肯定，从守住一个小边界、做一个小决定开始，练习肌肉般地积累"我可以"。',
      low:'自我价值感偏低，你可能习惯性讨好、不敢拒绝、把别人的需求放在自己前面，或者用突然的暴怒来掩盖长期的无力感。请记住：你的力量没有消失，只是被压住了。从今天起守住一个最小的边界——哪怕只是说一次"不"，都是在把主导权拿回自己手里。'
    }
  },
  {
    key:'heart', name:'心轮', color:'绿色', hex:'var(--c-heart)',
    trait:'温柔疗愈，天生爱人，擅长维系关系、治愈他人',
    heal:'多去森林与自然、养绿植，练习先对自己温柔与宽恕',
    analysis:{
      high:'你是天生的疗愈者——温柔、共情，既懂得爱人也懂得爱自己。过往的伤害能够放下，关系里少有嫉妒与怨恨，身边的人会自然而然被你的温暖吸引。你的存在本身，就是别人的安全感。',
      mid:'你有爱的能力，但心里还压着一些没化开的结：偶尔冒出的嫉妒、怨怼或与人之间的隔阂，说明有些旧伤还没被完全原谅——可能是对别人，也可能是对自己。多去自然里走走、养养绿植，练习先对自己温柔；当你放过自己，宽恕别人就会变得容易。',
      low:'心轮能量不足时，你可能习惯性封闭内心、害怕亲密，对人际关系感到疲惫甚至苦涩。这往往不是冷漠，而是自我保护——曾经受过的伤让心学会了关门。不必强迫自己立刻打开，先从每天善待自己一点点开始，被爱的感觉会一点点回来。'
    }
  },
  {
    key:'throat', name:'喉轮', color:'蓝色', hex:'var(--c-throat)',
    trait:'通透表达，坦诚纯粹，适合创作、沟通类工作',
    heal:'多唱歌、写日记，练习把心里话原样说出口',
    analysis:{
      high:'你表达通透、坦诚纯粹——敢说真话，不太在意别人是否认同，同时又擅长倾听、表达清晰，不心口不一。文字、歌声、观点分享都是你的天赋出口，创作类、沟通类的工作会让这份能量发挥到极致。',
      mid:'你能表达，但常常"过滤"：有些真话到嘴边又咽了回去，偶尔心口不一，或为了气氛刻意讨好。你并不缺表达力，缺的是"原样说出"的勇气——多唱歌、写日记，先在安全的场合练习说真话，喉轮会一点点亮起来。',
      low:'你可能习惯性沉默、长期压抑想法，甚至身体也在提醒你——喉咙常常干痛不适。请相信：你的声音是重要的，你的想法值得被听见。先从最安全的出口开始——对着纸笔，把没说出口的话一句句写下来，再慢慢练习对信任的人说出来。'
    }
  },
  {
    key:'eye', name:'眉心轮', color:'靛蓝', hex:'var(--c-eye)',
    trait:'灵性敏感，第六感超强，看透人心与规律',
    heal:'睡前冥想、记录梦境与第一直觉，练习信任自己的判断',
    analysis:{
      high:'你的直觉敏锐得惊人——第一判断往往准确，能穿透表象直达本质，不容易被话术和假象迷惑。想象力丰富、梦境清晰、擅长规划，第六感是你独有的导航系统。在复杂局面里，你总能比别人先看清方向。',
      mid:'你有洞察力，但还不够信任它：习惯用理性反复验证，反而错过了直觉给出的第一信号；头脑偶尔混乱焦虑，把内在的声音盖住了。试试睡前静心几分钟，记录梦境和每天的第一直觉，回头验证——你会发现它比你以为的准得多。',
      low:'头脑可能长期处于混乱和焦虑中，直觉被信息噪音淹没，容易被表象迷惑、难以做出判断，偏头痛也可能时常光顾。你需要的不是更多信息，而是安静——每天给自己几分钟独处放空，减少信息轰炸，内在的清明会慢慢恢复。'
    }
  },
  {
    key:'crown', name:'顶轮', color:'紫色', hex:'var(--c-crown)',
    trait:'通透觉醒，精神内核强大，看淡得失格局开阔',
    heal:'深夜冥想、放空独处，练习放下执念、与世界和解',
    analysis:{
      high:'你拥有通透觉醒的精神内核——内心平和，包容多元观念，不固执、不钻牛角尖，看淡得失、格局开阔。遇事能放下执念、与世界和解，这份超脱是很多人修炼多年都难以企及的天赋。你与"更大的图景"之间，有一条天然畅通的连接。',
      mid:'你偶尔能触碰到那种平静与通透的状态，但更多时候被现实琐事拉扯，容易陷入执念、钻进牛角尖。你知道"放下"是什么感觉，只是还不能随时回到那里——定期冥想、放空，接触让你安静的精神性内容，帮自己守住与大图景的连接。',
      low:'你可能感到人生缺乏意义感，容易固执己见、被执念困住，很难真正放下。不必急着"开悟"，也不必羡慕别人的通透——从每天几分钟的放空或深夜独处开始，先让心安静下来。当内在足够静，答案往往自己浮现。'
    }
  }
];

const BAND = s => s >= 13 ? 'high' : s >= 7 ? 'mid' : 'low';
const STATUS = { high:'能量通畅', mid:'平衡中等', low:'脉轮堵塞' };
const BADGE_CLS = { high:'open', mid:'', low:'blocked' };

let current = 0;
const answers = CHAKRAS.map(c => Array(c.questions ? c.questions.length : 4).fill(null));

CHAKRAS[0].questions = [
  '我对生活、金钱、住所拥有稳定安全感',
  '我很少焦虑生存压力，相信基础需求能被满足',
  '我热爱大地、自然，能踏实感受身体存在感',
  '我精力充沛，很少长期疲惫、体虚乏力'
];
CHAKRAS[1].questions = [
  '我愿意接纳、释放自己所有情绪，不压抑',
  '我拥有稳定爱好、创作欲，容易感受生活乐趣',
  '亲密关系里我放松自在，不羞耻自己的欲望',
  '我适应变化，情绪流动顺畅，不长期内耗压抑'
];
CHAKRAS[2].questions = [
  '我认可自我价值，不需要靠他人认可证明自己',
  '遇事敢做决定，懂得设立边界、拒绝不合理要求',
  '我有行动力，能主动掌控人生，不被动妥协',
  '很少自卑、容易暴怒，消化情绪能力强'
];
CHAKRAS[3].questions = [
  '我能温柔善待自己，也真心共情身边所有人',
  '过往伤害容易放下，擅长原谅他人与自己',
  '乐于付出爱，不害怕亲密，不会习惯性封闭内心',
  '人际关系和谐，很少心生嫉妒、怨恨、隔阂'
];
CHAKRAS[4].questions = [
  '我敢于说出真实想法，不在意他人是否认同',
  '擅长倾听，表达清晰，不会心口不一、刻意讨好',
  '有灵感、表达欲，喜欢文字、歌唱、分享观点',
  '很少喉咙干痛、失语、习惯性沉默压抑想法'
];
CHAKRAS[5].questions = [
  '我相信直觉，第一判断往往准确可靠',
  '经常记住清晰梦境，想象力丰富、擅长规划',
  '能看透事物本质，不容易被表象迷惑',
  '内心平静，很少长期焦虑、头脑混乱、偏头痛'
];
CHAKRAS[6].questions = [
  '时常感受到内心平和，有超脱世俗的通透感',
  '愿意接纳多元观念，不固执、不狭隘偏激',
  '偶尔有冥想、放空、探索精神世界的需求',
  '遇事不钻牛角尖，容易放下执念、与世界和解'
];

const spineWrap = document.getElementById('spineWrap');
CHAKRAS.forEach((c, i) => {
  const orb = document.createElement('div');
  orb.className = 'orb';
  orb.id = 'orb-' + i;
  orb.style.setProperty('--glow-color', c.hex);
  spineWrap.appendChild(orb);
});

function updateSpine(){
  CHAKRAS.forEach((c,i)=>{
    const orb = document.getElementById('orb-'+i);
    orb.classList.remove('active','done');
    if(i < current) orb.classList.add('done');
    else if(i === current) orb.classList.add('active');
  });
}

function startQuiz(){
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderSection();
}

function renderSection(){
  const c = CHAKRAS[current];
  document.getElementById('tagDot').style.setProperty('--glow-color', c.hex);
  document.getElementById('tagLabel').textContent = `脉轮 ${current+1} / 7`;
  document.getElementById('sectionTitle').textContent = `${c.name}（${c.color}）`;
  document.getElementById('sectionTitle').style.setProperty('--glow-color', c.hex);
  document.getElementById('quiz').style.setProperty('--glow-color', c.hex);

  const wrap = document.getElementById('questionsWrap');
  wrap.innerHTML = '';
  const labels = ['完全不符合','偶尔','经常','完全符合'];
  c.questions.forEach((q, qi) => {
    const block = document.createElement('div');
    block.className = 'q-block';
    let optsHtml = '';
    for(let v=1; v<=4; v++){
      const checked = answers[current][qi] === v ? 'checked' : '';
      optsHtml += `
        <div class="opt">
          <input type="radio" name="q${current}-${qi}" id="q${current}-${qi}-${v}" value="${v}" ${checked}
            onchange="setAnswer(${qi}, ${v})">
          <label for="q${current}-${qi}-${v}"><b>${v}</b>${labels[v-1]}</label>
        </div>`;
    }
    block.innerHTML = `<div class="q-text">${qi+1}. ${q}</div><div class="options">${optsHtml}</div>`;
    wrap.appendChild(block);
  });

  document.getElementById('prevBtn').style.visibility = current === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').textContent = current === CHAKRAS.length - 1 ? '查看结果' : '下一步';
  document.getElementById('progressText').textContent = `已完成 ${current} / ${CHAKRAS.length} 个脉轮`;
  updateNextState();
  updateSpine();
}

function setAnswer(qi, v){
  answers[current][qi] = v;
  updateNextState();
}

function updateNextState(){
  const done = answers[current].every(v => v !== null);
  document.getElementById('nextBtn').disabled = !done;
}

function nextSection(){
  if(!answers[current].every(v => v !== null)) return;
  if(current < CHAKRAS.length - 1){
    current++;
    renderSection();
    document.getElementById('quiz').scrollIntoView({behavior:'smooth', block:'start'});
  } else {
    showResults();
  }
}

function prevSection(){
  if(current > 0){
    current--;
    renderSection();
  }
}

function scoreOf(i){ return answers[i].reduce((a,b) => a + b, 0); }

function joinNames(arr){
  return arr.map(c => `${c.name}（${c.color}）`).join('、');
}

function buildSummary(scores){
  const sorted = [...scores].sort((a,b) => b.score - a.score);
  const topScore = sorted[0].score;
  const tops = sorted.filter(s => s.score === topScore);
  const bottomScore = sorted[sorted.length-1].score;
  const bottoms = sorted.filter(s => s.score === bottomScore);
  const blocked = scores.filter(s => s.score <= 6);
  const open = scores.filter(s => s.score >= 13);
  const second = sorted.filter(s => s.score < topScore && s.score >= 13);

  const ps = [];

  // paragraph 1: dominant
  let p1 = `你的主导脉轮是<span class="hl">${joinNames(tops)}</span>，得分 ${topScore} / 16。`;
  p1 += tops.length === 1
    ? `${tops[0].trait}——这是你当下最饱满的核心天赋。`
    : `这几股能量共同构成了你当下最饱满的核心天赋。`;
  if(second.length){
    p1 += `紧随其后的<span class="hl">${joinNames(second)}</span>同样处于通畅状态，与主导脉轮形成很好的支撑组合。`;
  }
  ps.push(p1);

  // paragraph 2: weak side
  if(blocked.length){
    let p2 = `需要重点关注的是<span class="hl">${joinNames(blocked)}</span>（≤6分，堵塞状态）。这些领域目前能量严重不足，容易出现情绪内耗与身体不适，建议按上方对应卡片的方法优先疗愈，先补短板、再谈提升。`;
    ps.push(p2);
  } else {
    let p2 = `相对薄弱的是<span class="hl">${joinNames(bottoms)}</span>（${bottomScore}分）。虽未达到堵塞程度，但它是你能量链条上最容易"漏电"的一环——参考上方卡片里的滋养方法，刻意练习一段时间，整体状态会明显提升。`;
    ps.push(p2);
  }

  // paragraph 3: overall balance
  let p3;
  if(blocked.length === 0 && open.length >= 5){
    p3 = `整体来看，你的七个脉轮大面积通畅，能量结构非常健康——这是精神与现实两头都能兼顾的状态，继续保持当下的生活方式即可。`;
  } else if(blocked.length === 0){
    p3 = `整体来看，你的能量分布${open.length >= 2 ? '比较均衡' : '中规中矩'}，没有明显的堵塞区，${open.length ? '通畅的脉轮是你的天赋区，' : ''}薄弱处也都在可调整的范围内。脉轮状态会随生活阶段流动变化，隔一段时间可以回来重测，观察自己的能量走向。`;
  } else {
    p3 = `脉轮能量不是固定不变的，它会随着生活状态流动。眼下先集中照顾堵塞的部分，等根基稳了，${open.length ? '你已经通畅的' + joinNames(open) + '会带动整体向上。' : '其他脉轮也会随之被带动起来。'}隔一段时间回来重测，见证自己的变化。`;
  }
  ps.push(p3);

  return ps.map(t => `<p>${t}</p>`).join('');
}

function showResults(){
  document.getElementById('quiz').classList.add('hidden');
  const results = document.getElementById('results');
  results.classList.remove('hidden');

  const scores = CHAKRAS.map((c,i) => ({...c, score: scoreOf(i)}));
  const sorted = [...scores].sort((a,b) => b.score - a.score);
  const topScore = sorted[0].score;
  const tops = sorted.filter(s => s.score === topScore);

  results.style.setProperty('--glow-color', tops[0].hex);
  document.getElementById('dominantName').textContent =
    tops.map(t => `${t.name} · ${t.color}`).join('  /  ');
  document.getElementById('dominantDesc').textContent =
    `总分 ${topScore} / 16 —— ${tops.map(t=>t.trait).join('；')}。`;

  // bars (spine order)
  const barsWrap = document.getElementById('barsWrap');
  barsWrap.innerHTML = '';
  scores.forEach(c => {
    const pct = Math.round(c.score / 16 * 100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.style.setProperty('--glow-color', c.hex);
    row.innerHTML = `
      <div class="bar-label">${c.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:0%; background:${c.hex};" data-pct="${pct}"></div></div>
      <div class="bar-score">${c.score}</div>
    `;
    barsWrap.appendChild(row);
  });
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelectorAll('.bar-fill').forEach(el=>{
        el.style.width = el.dataset.pct + '%';
      });
    }, 60);
  });

  // detail cards (score desc)
  const detailsWrap = document.getElementById('detailsWrap');
  detailsWrap.innerHTML = '';
  sorted.forEach(c => {
    const band = BAND(c.score);
    const card = document.createElement('div');
    card.className = 'detail-card';
    card.style.setProperty('--glow-color', c.hex);
    let healHtml = '';
    if(band !== 'high'){
      healHtml = `<p class="detail-heal"><b>滋养方法：</b>${c.heal}</p>`;
    }
    card.innerHTML = `
      <div class="detail-head">
        <span class="dot"></span>
        <span class="detail-name">${c.name} · ${c.color}</span>
        <span class="detail-score">${c.score}<small> / 16</small></span>
        <span class="badge ${BADGE_CLS[band]}">${STATUS[band]}</span>
      </div>
      <p class="detail-text">${c.analysis[band]}</p>
      ${healHtml}
    `;
    detailsWrap.appendChild(card);
  });

  // summary
  document.getElementById('summaryWrap').innerHTML = buildSummary(scores);

  // spine final state: orb size by score
  current = CHAKRAS.length;
  updateSpine();
  CHAKRAS.forEach((c,i)=>{
    const orb = document.getElementById('orb-'+i);
    const scale = 0.7 + (scores[i].score/16) * 0.9;
    orb.classList.add('done');
    orb.style.width = (22*scale) + 'px';
    orb.style.height = (22*scale) + 'px';
  });

  results.scrollIntoView({behavior:'smooth', block:'start'});
}

function restart(){
  current = 0;
  CHAKRAS.forEach((c,i) => answers[i].fill(null));
  document.getElementById('results').classList.add('hidden');
  document.getElementById('intro').classList.remove('hidden');
  CHAKRAS.forEach((c,i)=>{
    const orb = document.getElementById('orb-'+i);
    orb.style.width = '22px';
    orb.style.height = '22px';
    orb.classList.remove('done','active');
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

updateSpine();
</script>

</body>
</html>
